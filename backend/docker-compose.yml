services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./downloads:/srv
    depends_on:
      - api

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:donghuaflix2026@db:5432/donghuaflix
      - SYNC_DATABASE_URL=postgresql://postgres:donghuaflix2026@db:5432/donghuaflix
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
      - poster_cache:/app/assets/posters
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:donghuaflix2026@db:5432/donghuaflix
      - SYNC_DATABASE_URL=postgresql://postgres:donghuaflix2026@db:5432/donghuaflix
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
      - poster_cache:/app/assets/posters
    command: celery -A app.scraper.tasks worker -l info -c 2

  beat:
    build: .
    depends_on:
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:donghuaflix2026@db:5432/donghuaflix
      - SYNC_DATABASE_URL=postgresql://postgres:donghuaflix2026@db:5432/donghuaflix
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
    command: celery -A app.scraper.tasks beat -l info

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=donghuaflix
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=donghuaflix2026
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  poster_cache:
