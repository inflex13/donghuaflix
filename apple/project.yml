name: DonghuaFlix
options:
  bundleIdPrefix: com.donghuaflix
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  DonghuaFlix-iOS:
    type: application
    platform: iOS
    sources:
      - path: DonghuaFlix
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghuaflix.app
        PRODUCT_NAME: DonghuaFlix
        INFOPLIST_KEY_CFBundleDisplayName: DonghuaFlix
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1

  DonghuaFlix-macOS:
    type: application
    platform: macOS
    sources:
      - path: DonghuaFlix
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghuaflix.app
        PRODUCT_NAME: DonghuaFlix
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
    postBuildScripts:
      - script: |
          cp -R "${BUILT_PRODUCTS_DIR}/DonghuaFlix.app" "/Applications/DonghuaFlix.app" 2>/dev/null || true
        name: "Copy to /Applications"

schemes:
  DonghuaFlix-iOS:
    build:
      targets:
        DonghuaFlix-iOS: all
  DonghuaFlix-macOS:
    build:
      targets:
        DonghuaFlix-macOS: all
